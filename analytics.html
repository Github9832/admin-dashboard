    <meta
      name="description"
      content="Analytics view for traffic, sessions, conversion, and revenue trends."

    <link rel="stylesheet" href="assets/css/style.css" />

  <body>
    <div class="page">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <img src="assets/logo/logo.svg" alt="AdminX logo" />
          <h1>AdminX</h1>
          <p>Control center</p>
        </div>
        <nav>
          <ul class="nav-list">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="users.html">Users</a></li>
            <li
              ><a class="active" aria-current="page" href="analytics.html"

            >
            <li><a href="messages.html">Messages</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="settings.html">Settings</a></li>
          </ul>
        </nav>
        <div class="nav-footer"><a href="login.html">Sign out</a></div>

            ><h2 class="section-title">Bounce Rate</h2
            ><div class="fake-chart" aria-hidden="true"></div
          ></article>
          <article class="analytics-card"
            ><h2 class="section-title">New Signups</h2
            ><div class="fake-chart" aria-hidden="true"></div
          ></article>
          <article class="analytics-card"
            ><h2 class="section-title">Revenue Forecast</h2
            ><div class="fake-chart" aria-hidden="true"></div
