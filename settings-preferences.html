<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preferences | AdminX</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2 class="logo">AdminX</h2>

        <a href="index.html">🏠 Dashboard</a>
        <a href="analytics.html">📊 Analytics</a>
        <a href="users.html">👤 Users</a>
        <a href="messages.html">💬 Messages</a>
        <a href="reports.html">📑 Reports</a>

        <div class="settings-submenu">
            <a href="settings.html">⚙ Settings Home</a>
            <a href="settings-profile.html">🧑 Profile</a>
            <a href="settings-security.html">🔒 Security</a>
            <a href="settings-preferences.html" class="active">✨ Preferences</a>
        </div>

        <a href="login.html" class="logout">🚪 Logout</a>
    </aside>

    <!-- Main Content -->
    <div class="main">
        <h1>Preferences</h1>

        <div class="settings-card">
            <h2>Appearance</h2>

            <div class="toggle-row">
                <span>Dark Mode</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="settings-card">
            <h2>Notifications</h2>

            <div class="toggle-row">
                <span>Email Notifications</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="toggle-row">
                <span>Push Notifications</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

        </div>

    </div>

</body>
</html>
