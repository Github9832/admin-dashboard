<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AdminX</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <img src="assets/logo/logo.svg" alt="AdminX Logo">
        </div>

        <a href="index.html" class="active">🏠 Dashboard</a>
        <a href="users.html">👥 Users</a>
        <a href="analytics.html">📊 Analytics</a>
        <a href="messages.html">💬 Messages</a>
        <a href="settings.html">⚙️ Settings</a>
        <a href="login.html">🚪 Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <div class="topbar">
            <h2>Dashboard Overview</h2>
            <img src="assets/img/profile.jpg" class="user-img">
        </div>

        <div class="card-row">
            <div class="small-card">
                <h3>Total Users</h3>
                <p>1,248</p>
            </div>
            <div class="small-card">
                <h3>New Orders</h3>
                <p>312</p>
            </div>
            <div class="small-card">
                <h3>Revenue</h3>
                <p>$42,800</p>
            </div>
        </div>

        <div class="glass-card">
            <h3>Recent Activity</h3>
            <table>
                <tr>
                    <th>User</th>
                    <th>Activity</th>
                    <th>Time</th>
                </tr>
                <tr>
                    <td>John</td>
                    <td>Created new order</td>
                    <td>5 mins ago</td>
                </tr>
                <tr>
                    <td>Maria</td>
                    <td>Updated profile</td>
                    <td>12 mins ago</td>
                </tr>
                <tr>
                    <td>James</td>
                    <td>Sent a message</td>
                    <td>20 mins ago</td>
                </tr>
            </table>
        </div>

    </div>

</body>
</html>
